<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Toner</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.container {
  width: 350px;
  margin: auto;
}

input, select, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00c6ff;
  font-weight: bold;
  cursor: pointer;
}

.barra {
  background: #333;
  height: 20px;
  border-radius: 10px;
}

.progresso {
  height: 20px;
  background: #00ff88;
  width: 0%;
}

table {
  width: 100%;
  margin-top: 20px;
  font-size: 12px;
}
</style>

</head>

<body>

<div class="container">
<h2>Calculadora de Toner</h2>

<select id="marca" onchange="carregarModelos()">
  <option value="">Selecione a marca</option>
  <option value="kyocera">Kyocera</option>
  <option value="brother">Brother</option>
</select>

<select id="modelo"></select>

<input type="number" id="peso" placeholder="Peso atual (g)">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

<div class="barra">
  <div class="progresso" id="barra"></div>
</div>

<hr>

<h3>Histórico</h3>
<table border="1">
<thead>
<tr>
<th>Modelo</th>
<th>Peso</th>
<th>%</th>
<th>Data</th>
</tr>
</thead>
<tbody id="historico"></tbody>
</table>

</div>

<script>

const API = "http://localhost:3000";

// 🔥 MODELOS FIXOS
const dados = {
  kyocera: [
    { nome: "TK-3182", cheio: 800, vazio: 200 },
    { nome: "TK-3422", cheio: 800, vazio: 200 }
  ],
  brother: [
    { nome: "TN-3492", cheio: 1100, vazio: 500 }
  ]
};

// carregar modelos por marca
function carregarModelos() {
  let marca = document.getElementById("marca").value;
  let select = document.getElementById("modelo");

  select.innerHTML = "";

  if (!marca) return;

  dados[marca].forEach(m => {
    let opt = document.createElement("option");
    opt.value = JSON.stringify(m);
    opt.innerText = m.nome;
    select.appendChild(opt);
  });
}

// calcular e salvar
async function calcular() {
  let peso = parseFloat(document.getElementById("peso").value);
  let modelo = JSON.parse(document.getElementById("modelo").value);

  if (isNaN(peso)) {
    alert("Digite um peso válido!");
    return;
  }

  let total = modelo.cheio - modelo.vazio;
  let porcentagem = ((peso - modelo.vazio) / total) * 100;

  if (porcentagem < 0) porcentagem = 0;
  if (porcentagem > 100) porcentagem = 100;

  document.getElementById("resultado").innerText =
    "Toner restante: " + porcentagem.toFixed(2) + "%";

  document.getElementById("barra").style.width = porcentagem + "%";

  // salvar no banco
  await fetch(API + "/pesagem", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      modelo: modelo.nome,
      peso,
      porcentagem
    })
  });

  carregarHistorico();
}

// histórico
async function carregarHistorico() {
  const res = await fetch(API + "/historico");
  const dados = await res.json();

  let tabela = document.getElementById("historico");
  tabela.innerHTML = "";

  dados.forEach(p => {
    let row = `
      <tr>
        <td>${p.modelo}</td>
        <td>${p.peso}</td>
        <td>${p.porcentagem.toFixed(2)}%</td>
        <td>${new Date(p.data).toLocaleString()}</td>
      </tr>
    `;
    tabela.innerHTML += row;
  });
}

carregarHistorico();

</script>

</body>
</html>
