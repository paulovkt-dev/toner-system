<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Toner</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
    }

    #resultado {
      margin-top: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>🖨️ Toner</h2>

    <select id="modelo">
      <option value="kyocera3182">Kyocera TK-3182</option>
      <option value="kyocera3422">Kyocera TK-3422</option>
      <option value="brother3492">Brother TN-3492</option>
    </select>

    <input type="number" id="peso" placeholder="Peso (g)">

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
  </div>

<script>
const API = "https://toner-system.onrender.com";

const modelos = {
  kyocera3182: { cheio: 800, vazio: 200 },
  kyocera3422: { cheio: 800, vazio: 200 },
  brother3492: { cheio: 1100, vazio: 500 }
};

async function calcular() {
  const modelo = document.getElementById("modelo").value;
  const peso = parseFloat(document.getElementById("peso").value);

  if (!peso) {
    alert("Digite o peso");
    return;
  }

  const dados = modelos[modelo];
  const porcentagem = ((peso - dados.vazio) / (dados.cheio - dados.vazio)) * 100;

  document.getElementById("resultado").innerText =
    porcentagem.toFixed(2) + "%";

  // ainda salva no banco (mesmo sem mostrar histórico)
  await fetch(API + "/historico", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ modelo, peso, porcentagem })
  });
}
</script>

</body>
</html>
