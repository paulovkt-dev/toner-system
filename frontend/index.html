<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Toner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  margin-top: 0;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

canvas {
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="card">
    <h2>📥 Entrada</h2>

    <select id="modelo">
      <option value="kyocera3182">Kyocera TK-3182</option>
      <option value="kyocera3422">Kyocera TK-3422</option>
      <option value="brother3492">Brother TN-3492</option>
    </select>

    <input type="number" id="peso" placeholder="Peso (g)">

    <button onclick="calcular()">Calcular</button>

    <h3 id="resultado"></h3>
  </div>

  <!-- LADO DIREITO -->
  <div class="card">
    <h2>📊 Histórico</h2>
    <canvas id="grafico"></canvas>
  </div>

</div>

<script>
const API = "https://toner-system.onrender.com";

const modelos = {
  kyocera3182: { cheio: 800, vazio: 200 },
  kyocera3422: { cheio: 800, vazio: 200 },
  brother3492: { cheio: 1100, vazio: 500 }
};

let chart;

async function calcular() {
  const modelo = document.getElementById("modelo").value;
  const peso = parseFloat(document.getElementById("peso").value);

  const dados = modelos[modelo];
  const porcentagem = ((peso - dados.vazio) / (dados.cheio - dados.vazio)) * 100;

  document.getElementById("resultado").innerText =
    porcentagem.toFixed(2) + "%";

  await fetch(API + "/historico", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ modelo, peso, porcentagem })
  });

  carregarGrafico();
}

async function carregarGrafico() {
  const res = await fetch(API + "/historico");
  const dados = await res.json();

  const labels = dados.map(d => d.modelo);
  const valores = dados.map(d => d.porcentagem);

  if (chart) chart.destroy();

  const ctx = document.getElementById("grafico");

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "% Toner",
        data: valores
      }]
    }
  });
}

carregarGrafico();
</script>

</body>
</html>
